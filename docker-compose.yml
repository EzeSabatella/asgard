services:
  neo4j:
    image: neo4j:5.12.0
    container_name: asgard-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - ./data/neo4j/data:/data
      - ./data/neo4j/logs:/logs
      - ./data/neo4j/import:/import
      - ./data/neo4j/plugins:/plugins
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    container_name: asgard-chromadb
    ports:
      - "8001:8000"
    volumes:
      - ./data/chromadb:/chroma/chroma
    restart: unless-stopped

  chassis:
    build: ./chassis
    container_name: asgard-chassis
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Overrides para usar service names en lugar de localhost
      - NEO4J_URI=bolt://neo4j:7687
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
    volumes:
      # Dev: source montado para hot reload sin rebuild
      - ./chassis/src:/app/src
      - ./chassis/chassis.config.yaml:/app/chassis.config.yaml
      # Persistencia de SQLite
      - ./data/storage:/app/data/storage
    depends_on:
      - neo4j
      - chromadb
    restart: unless-stopped
